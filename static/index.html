<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulify RAG Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <h1>Regulify</h1>
            <div class="header-actions">
                <button id="clear-btn" class="secondary-btn">Clear Chat</button>
            </div>
        </header>

        <main id="chat-container">
            <div class="welcome-message">
                <h2>Welcome to Regulify RAG</h2>
                <p>Ask a question based on your document.</p>
            </div>
        </main>

        <footer class="input-area glass-footer">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Ask anything about the document..." required autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
